<section class="hero" itemscope itemtype="https://schema.org/SoftwareApplication">
  <meta itemprop="name" content="Nostria">
  <meta itemprop="applicationCategory" content="SocialNetworkingApplication">
  <meta itemprop="operatingSystem" content="Web, Windows, Android">
  <meta itemprop="offers" itemscope itemtype="https://schema.org/Offer">
  <meta itemprop="price" content="0">
  <meta itemprop="priceCurrency" content="USD">

  <div class="container">
    <div class="hero-content">
      <div class="hero-text">
        <div class="hero-kicker">Built for human connections</div>
        <h1 class="hero-title">Your Social Network</h1>
        <div class="hero-message-row">
          <div class="hero-cta">
            <a
              itemprop="url"
              href="https://nostria.app"
              target="_blank"
              rel="noopener"
              class="btn btn-primary btn-hero"
            >
              <img
                ngSrc="assets/icons/icon-128x128.png"
                width="72"
                height="72"
                alt=""
                aria-hidden="true"
                class="btn-app-icon"
              >
              <span class="btn-brand title-font">Nostria.app</span>
            </a>
          </div>

          <p class="hero-subtitle" itemprop="description">
            <strong>See your friends again.</strong><br> Nostria is social without the noise.
          </p>
        </div>

      </div>
    </div>
  </div>
</section>
